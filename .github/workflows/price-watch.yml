name: Price Watch

# Weekly automated check + manual trigger for testing
on:
  push:
    branches: ['staging']   # TEMPORARY — lets the first run fire without needing the Actions UI button
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
  workflow_dispatch:        # lets you run it on-demand from the Actions tab to test

permissions:
  contents: write   # to commit the updated price-snapshots.json
  issues: write      # to open/update the review Issue

jobs:
  price-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run price watch
        id: price
        run: node automation/price-watch.js
        continue-on-error: true   # don't let a fetch failure kill the whole job

      - name: Run link check
        id: links
        run: node automation/link-check.js
        continue-on-error: true

      - name: Build review Issue (if anything needs attention)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const priceResult = JSON.parse(fs.readFileSync('automation/price-watch-result.json', 'utf8'));
            const linkResult  = JSON.parse(fs.readFileSync('automation/link-check-result.json', 'utf8'));

            const hasChanges  = priceResult.changes.length > 0;
            const hasErrors   = priceResult.errors.length > 0;
            const hasProblems = linkResult.problems.length > 0;

            if (!hasChanges && !hasErrors && !hasProblems) {
              console.log('Nothing to report this week — no Issue created.');
              return;
            }

            let body = `Automated weekly check — ${new Date().toISOString().slice(0,10)}\n\n`;
            body += `**This is informational only — nothing has been changed on the live site.** Review below, then edit \`site-data.js\` by hand and run \`node update-site.js\` if a change is real.\n\n`;

            if (hasChanges) {
              body += `## 💰 Price page changes detected\n\n`;
              for (const c of priceResult.changes) {
                body += `### ${c.name}\n`;
                body += `[${c.url}](${c.url})\n\n`;
                if (c.added.length)   body += `- **New:** ${c.added.join(', ')}\n`;
                if (c.removed.length) body += `- **Gone:** ${c.removed.join(', ')}\n`;
                body += `\n`;
              }
            }

            if (hasErrors) {
              body += `## ⚠️ Couldn't check these pricing pages\n\n`;
              for (const e of priceResult.errors) {
                body += `- **${e.name}**: ${e.error} — [${e.url}](${e.url})\n`;
              }
              body += `\nIf a URL is wrong, fix it in \`automation/price-sources.js\`.\n\n`;
            }

            if (hasProblems) {
              body += `## 🔗 Affiliate link problems\n\n`;
              for (const p of linkResult.problems) {
                body += `- **${p.id}** (${p.source}): ${p.issue}\n  ${p.link}\n`;
              }
              body += `\n`;
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'price-watch',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
              console.log(`Updated existing Issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Price/link watch — ${new Date().toISOString().slice(0,10)}`,
                body,
                labels: ['price-watch'],
              });
              console.log(`Created Issue #${issue.data.number}`);
            }

      - name: Commit updated price snapshot
        run: |
          git config user.name "VPN Compare Bot"
          git config user.email "bot@bestvpncompareonline.com"
          git add automation/price-snapshots.json
          git diff --staged --quiet || git commit -m "Price watch snapshot update: $(date '+%d %B %Y')"
          git push