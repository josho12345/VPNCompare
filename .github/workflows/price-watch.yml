But www returns a 301 redirect to non-www. So the page that's actually serving (non-www, 200 OK) is telling Google "treat the www version as canonical" вАФ and www immediately bounces back. Screaming Frog correctly flagged this as a Non-Indexable Canonical (the canonical URL is a redirecting page, not an indexable one) and also as a Non-200 Hreflang URL (all four hreflang entries вАФ en-gb, en-us, en-au, and x-default вАФ point to the 301-redirecting www version, which Google ignores entirely).
