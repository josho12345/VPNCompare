name: Update Site

# Triggers automatically whenever site-data.js is edited and committed
# (works from phone via GitHub app, GitHub website, or any device)
on:
  push:
    paths:
      - 'site-data.js'

  # Also allows manual trigger from GitHub Actions tab if needed
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository files
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js (same version as laptop)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Run the update script — patches index.html with new prices/dates/speeds
      - name: Run site update script
        run: node update-site.js

      # 4. Commit the updated index.html back to the repo
      #    Only commits if index.html actually changed (avoids empty commits)
      - name: Commit updated index.html
        run: |
          git config user.name "VPN Compare Bot"
          git config user.email "bot@bestvpncompareonline.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%d %B %Y')"
          git push

      # 5. Print a summary so you can see what changed in the Actions log
      - name: Print update summary
        run: |
          echo "=========================================="
          echo "Site update complete — $(date '+%d %B %Y %H:%M UTC')"
          echo "Changes committed to index.html"
          echo "GitHub Pages will re-deploy automatically"
          echo "=========================================="
