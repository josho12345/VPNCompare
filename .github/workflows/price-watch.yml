name: Price Watch

# Weekly automated check + manual trigger for testing
on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
  workflow_dispatch:        # run on-demand from Actions tab

permissions:
  contents: write
  issues: write

env:
  # ── AUTO-UPDATE SWITCH ──────────────────────────────────────
  # false = monitor only. Detects changes, raises Issue, emails
  #         you. You update site-data.js manually as normal.
  # true  = auto-patch validated price changes into site-data.js,
  #         run update-site.js, commit, then email you the diff.
  #         Prices outside safety range still go to manual review.
  # Change this one line to flip between modes.
  AUTO_UPDATE: 'false'

jobs:
  price-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run price watch
        id: price
        run: node automation/price-watch.js
        continue-on-error: true

      - name: Run link check
        id: links
        run: node automation/link-check.js
        continue-on-error: true

      - name: Run auto update
        id: autoupdate
        run: node automation/auto-update.js
        env:
          AUTO_UPDATE: ${{ env.AUTO_UPDATE }}
        continue-on-error: true

      - name: Build review Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const priceResult  = JSON.parse(fs.readFileSync('automation/price-watch-result.json',  'utf8'));
            const linkResult   = JSON.parse(fs.readFileSync('automation/link-check-result.json',   'utf8'));
            const autoResult   = fs.existsSync('automation/auto-update-result.json')
                                   ? JSON.parse(fs.readFileSync('automation/auto-update-result.json', 'utf8'))
                                   : null;

            const hasChanges   = priceResult.changes.length > 0;
            const hasErrors    = priceResult.errors.length  > 0;
            const hasProblems  = linkResult.problems.length > 0;
            const hasReview    = autoResult?.needsReview?.length > 0;
            const hasAutoUpdated = autoResult?.autoUpdated?.length > 0;

            if (!hasChanges && !hasErrors && !hasProblems) {
              console.log('Nothing to report -- no Issue created.');
              return;
            }

            const autoMode = autoResult?.autoUpdateEnabled ? 'ON' : 'OFF';
            let body = `Automated weekly check -- ${new Date().toISOString().slice(0,10)}\n\n`;
            body += `Auto-update mode: **${autoMode}**\n\n`;

            if (hasAutoUpdated) {
              body += `## Prices auto-updated\n\n`;
              body += `The following were automatically patched into site-data.js and pushed live:\n\n`;
              for (const u of autoResult.autoUpdated) {
                body += `- **${u.name}**: ${u.currency}${u.oldPrice} -> ${u.currency}${u.newPrice} (${u.field})\n`;
              }
              body += `\n> Note: buyPrice and buyNote fields were not auto-updated -- check these manually if the displayed price string needs updating.\n\n`;
              core.exportVariable('ISSUE_CREATED', 'true');
            }

            if (hasReview) {
              body += `## Needs manual review\n\n`;
              for (const r of autoResult.needsReview) {
                body += `### ${r.name}\n`;
                body += `${r.reason}\n`;
                if (r.currentStored !== undefined) body += `- Stored: ${r.currency || ''}${r.currentStored}\n`;
                if (r.detectedPrice !== undefined) body += `- Detected: ${r.currency || ''}${r.detectedPrice}\n`;
                if (r.field) body += `- Field: site-data.js prices.${r.id}.${r.field}\n`;
                body += '\n';
              }
              core.exportVariable('ISSUE_CREATED', 'true');
            }

            if (hasErrors) {
              body += `## Fetch errors\n\n`;
              for (const e of priceResult.errors) {
                body += `- **${e.name}**: ${e.error} -- [${e.url}](${e.url})\n`;
              }
              body += `\nIf a URL is wrong, fix it in \`automation/price-sources.js\`.\n\n`;
              core.exportVariable('ISSUE_CREATED', 'true');
            }

            if (hasProblems) {
              body += `## Affiliate link problems\n\n`;
              for (const p of linkResult.problems) {
                body += `- **${p.id}** (${p.source}): ${p.issue}\n  ${p.link}\n`;
              }
              body += '\n';
              core.exportVariable('ISSUE_CREATED', 'true');
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'price-watch',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
              console.log(`Updated Issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Price/link watch -- ${new Date().toISOString().slice(0,10)}`,
                body, labels: ['price-watch'],
              });
              console.log(`Created Issue #${issue.data.number}`);
            }

      - name: Send email alert
        if: env.ISSUE_CREATED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "VPN Compare - Price/Link Alert"
          to: joshinparadise081@gmail.com
          from: joshinparadise081@gmail.com
          body: "Your weekly Price Watch found something that needs attention. Check GitHub Issues: https://github.com/josho12345/VPNCompare/issues"

      - name: Commit updated files
        run: |
          git config user.name "VPN Compare Bot"
          git config user.email "bot@bestvpncompareonline.com"
          git add automation/price-snapshots.json automation/auto-update-result.json site-data.js script.js
          git diff --staged --quiet || git commit -m "Price watch update: $(date '+%d %B %Y')"
          git push
