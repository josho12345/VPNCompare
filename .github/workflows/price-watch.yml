LOW PRIORITY WARNINGS вАФ SECURITY HEADERS (5 ITEMS, SAME PROBLEM)
Five of the ten items are all variants of the same issue: missing HTTP security response headers. Specifically:
X-Content-Type-Options, Content-Security-Policy, X-Frame-Options, and Referrer-Policy are absent.
These are server-level response headers. The site is hosted on GitHub Pages via GoDaddy. GitHub Pages does not support custom response headers вАФ there is no .htaccess, no _headers file equivalent, and no server config accessible to us. This is a hosting limitation, not something fixable in index.html. The correct fix would be migrating to a host that supports response header configuration (Netlify, Cloudflare Pages, Vercel) вАФ any of those have a simple _headers file that handles all four in about ten lines. Whether that migration is worth doing right now is a business decision, not a code one.
LOW PRIORITY WARNING вАФ UNSAFE CROSS-ORIGIN LINKS (1 ITEM)
One page has external links using target="_blank" without rel="noopener". Looking at the code, the affiliate links throughout use rel="nofollow sponsored" but are missing rel="noopener". As Screaming Frog's own description notes, this only affects legacy browsers estimated at under 5% market share вАФ every modern browser now applies noopener behavior automatically on target="_blank" links. Still, the correct fix is to add noopener to the rel attribute on every external affiliate link, changing rel="nofollow sponsored" to rel="nofollow sponsored noopener". That's a script.js update.
LOW PRIORITY WARNING вАФ INTERNAL NOFOLLOW OUTLINKS (1 ITEM)
Screaming Frog flagged one page with rel="nofollow" applied to an internal outlink. The affiliate links in script.js correctly use rel="nofollow sponsored" on external links вАФ those are fine and intentional. What needs checking is whether any anchor link pointing to an internal section (href="#compare", href="#quiz", etc.) or any internal href is accidentally carrying a nofollow attribute. I'd need to confirm the exact URL Screaming Frog identified in its Outlinks tab to be certain.
LOW PRIORITY WARNING вАФ INTERNAL REDIRECTION 3XX (1 ITEM)
This is www redirecting to non-www. That's the GoDaddy Pages setup вАФ intentional and correct behaviour. Nothing to fix here; this will always appear in a crawl as long as www exists.
