name: Patch Live Flags (run once)

# Manually triggered from Actions tab -- run once to add live flag system
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run patch-live.js
        run: node patch-live.js

      - name: Run update-site.js
        run: node update-site.js

      - name: Commit and push changes
        run: |
          git config user.name "VPN Compare Bot"
          git config user.email "bot@bestvpncompareonline.com"
          git add script.js index.html site-data.js
          git diff --staged --quiet || git commit -m "Add live flag system + IPVanish, TunnelBear, Hotspot Shield"
          git push
